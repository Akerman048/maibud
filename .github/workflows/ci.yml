name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
      AUTH_SECRET: ci-only-not-a-real-secret-change-me-32-characters
      AUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      AWS_REGION: eu-central-1
      AWS_S3_BUCKET: maibud-ci-placeholder
      AWS_ACCESS_KEY_ID: ci-placeholder
      AWS_SECRET_ACCESS_KEY: ci-placeholder
      RESEND_API_KEY: re_ci_placeholder
      EMAIL_FROM: МайБуд <ci@example.com>
      EMAIL_JOB_SECRET: ci-email-job-secret-at-least-32-characters
      APP_URL: http://localhost:3000
      NEXT_TELEMETRY_DISABLED: "1"
      SENTRY_DSN: ""
      NEXT_PUBLIC_SENTRY_DSN: ""
      SENTRY_AUTH_TOKEN: ""
      SENTRY_ORG: ""
      SENTRY_PROJECT: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm exec prisma validate

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Coverage
        run: pnpm run test:coverage

      - name: Build
        run: pnpm run build
